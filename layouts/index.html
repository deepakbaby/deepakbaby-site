{{ define "navbar" }}
{{ partial "navigators/modern-navbar.html" . }}
{{ end }}

{{ define "content" }}
<div class="homepage-wrapper">
    <!-- Global Background -->
    {{ if ne site.Params.customTheme "paper" }}
    <div class="page-bg" aria-hidden="true">
        <svg class="page-landscape" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,900 L0,580 Q180,520 360,550 Q540,580 720,540 Q900,500 1080,530 Q1260,560 1440,510 L1440,900 Z" fill="var(--landscape-far, rgba(123,147,255,0.06))"/>
            <path d="M0,900 L0,640 Q200,600 400,620 Q600,640 800,610 Q1000,580 1200,620 Q1350,640 1440,600 L1440,900 Z" fill="var(--landscape-mid, rgba(123,147,255,0.04))"/>
            <path d="M0,900 L0,710 Q240,680 480,700 Q720,720 960,690 Q1200,660 1440,700 L1440,900 Z" fill="var(--landscape-near, rgba(123,147,255,0.025))"/>
        </svg>
        <!-- noise overlay removed -->
    </div>
    {{ end }}

    <!-- Hero Section -->
    <div class="section-wrapper">
        {{ partial "hero.html" . }}
    </div>

    <div class="section-separator"></div>

    <!-- Bento Grid: Career + Education + Publications -->
    <div class="section-wrapper">
        {{ partial "bento_grid.html" . }}
    </div>

    <div class="section-separator"></div>

    <!-- Blog Posts Slide Deck -->
    <div class="section-wrapper">
        {{ partial "posts_slider.html" . }}
    </div>

    <!-- SVG wave bridge: blends carousel into footer -->
    <div class="footer-wave-bridge" aria-hidden="true">
        <svg class="blend-wave" viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path class="blend-wave-far" d="M0,400 L0,60 Q160,10 320,50 Q480,90 640,35 Q800,0 960,40 Q1120,75 1280,25 Q1380,5 1440,30 L1440,400 Z"/>
            <path class="blend-wave-mid" d="M0,400 L0,140 Q180,90 360,130 Q540,170 720,110 Q900,60 1080,105 Q1260,150 1440,90 L1440,400 Z"/>
            <path class="blend-wave-near" d="M0,400 L0,240 Q200,200 400,225 Q600,250 800,215 Q1000,180 1200,210 Q1350,235 1440,200 L1440,400 Z"/>
        </svg>
    </div>

    <!-- Floating Navigation (hidden) -->
    <nav class="floating-nav" id="floatingNav">
        <a href="#hero" class="nav-dot active" data-section="hero" title="Home"></a>
        <a href="#experiences" class="nav-dot" data-section="experiences" title="Experience"></a>
        <a href="#posts" class="nav-dot" data-section="posts" title="Blog"></a>
        <a href="#publications" class="nav-dot" data-section="publications" title="Publications"></a>
    </nav>
</div>

<style>
    /* Homepage Global Styles */
    /* Remove wrapper padding/margin for edge-to-edge layout on mobile */
    .kind-home .container-fluid.wrapper,
    .kind-home .wrapper,
    .kind-home .content-section,
    .kind-home .page-content {
        max-width: none !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    .kind-home .wrapper .sidebar-section,
    .kind-home .toc-section {
        display: none !important;
    }

    .homepage-wrapper {
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow-x: clip;
        scroll-behavior: smooth;
        position: relative;
    }

    /* Global page background - landscape + noise spanning all sections */
    .page-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
    }

    .page-landscape {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        --landscape-far: rgba(123, 147, 255, 0.06);
        --landscape-mid: rgba(123, 147, 255, 0.04);
        --landscape-near: rgba(123, 147, 255, 0.025);
    }

    [data-theme="light"] .page-landscape {
        --landscape-far: rgba(91, 116, 224, 0.08);
        --landscape-mid: rgba(91, 116, 224, 0.05);
        --landscape-near: rgba(91, 116, 224, 0.03);
    }

    [data-theme="paper"] .page-bg {
        display: none;
    }

    .page-noise {
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.04;
    }

    .section-wrapper {
        position: relative;
        z-index: 2;
    }

    /* Pull footer up for seamless blend on homepage */
    .kind-home .site-footer {
        margin-top: -2rem;
        padding-top: 3rem;
    }

    /* Footer wave bridge: fades from page bg into footer bg behind content */
    .footer-wave-bridge {
        position: relative;
        z-index: 1;
        margin-top: -8rem;
        height: 14rem;
        pointer-events: none;
        line-height: 0;
    }

    .footer-wave-bridge .blend-wave {
        display: block;
        width: 100%;
        height: 100%;
    }

    .footer-wave-bridge .blend-wave-far {
        fill: var(--bg-primary, rgba(20, 24, 42, 0.4));
        opacity: 0.3;
    }

    .footer-wave-bridge .blend-wave-mid {
        fill: var(--bg-primary, rgba(22, 26, 44, 0.7));
        opacity: 0.6;
    }

    .footer-wave-bridge .blend-wave-near {
        fill: var(--bg-primary, #171B2E);
    }

    /* Wave bridge hidden — footer camouflages into page bg */
    .footer-wave-bridge {
        display: none;
    }

    /* Section separators */
    .section-separator {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-color, rgba(255, 255, 255, 0.08)), transparent);
        position: relative;
    }

    /* Hide floating nav - hero has its own nav now */
    .floating-nav {
        display: none;
    }

    .floating-nav.visible {
        display: none;
    }

    .nav-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: none;
        transition: all 0.2s ease;
        cursor: pointer;
        position: relative;
    }

    .nav-dot::before {
        content: attr(title);
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: #fff;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        font-size: 0.75rem;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
    }

    .nav-dot:hover::before {
        opacity: 1;
    }

    .nav-dot:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .nav-dot.active {
        background: var(--accent, #7B93FF);
    }

    /* Responsive hiding for floating nav */
    @media (max-width: 1024px) {
        .floating-nav {
            display: none;
        }
    }

    /* Smooth scrolling for whole page */
    html {
        scroll-behavior: smooth;
    }

    /* Ensure body doesn't have horizontal scroll */
    body {
        overflow-x: clip;
    }
</style>

<script>
    // Enhanced Scroll Reveal Animations
    document.addEventListener('DOMContentLoaded', function () {
        // Reveal animation on scroll
        const revealElements = document.querySelectorAll('.reveal-up, .timeline-item, .education-card, .skill-category, .project-card, .bento-box');

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                }
            });
        }, {
            threshold: 0.1,
            rootMargin: '-50px'
        });

        revealElements.forEach(el => revealObserver.observe(el));

        // Floating navigation
        const floatingNav = document.getElementById('floatingNav');
        const navDots = document.querySelectorAll('.nav-dot');
        const sections = document.querySelectorAll('section[id]');

        // Show/hide floating nav based on scroll position
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset;

            // Show nav after scrolling past hero
            if (scrollTop > window.innerHeight * 0.5) {
                floatingNav?.classList.add('visible');
            } else {
                floatingNav?.classList.remove('visible');
            }

            // Update active dot based on current section
            let current = '';
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.offsetHeight;
                if (scrollTop >= sectionTop - window.innerHeight / 2) {
                    current = section.getAttribute('id');
                }
            });

            navDots.forEach(dot => {
                dot.classList.remove('active');
                if (dot.getAttribute('data-section') === current) {
                    dot.classList.add('active');
                }
            });

            lastScrollTop = scrollTop;
        });

        // Smooth scroll for nav dots
        navDots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = dot.getAttribute('href');
                const targetSection = document.querySelector(targetId);
                if (targetSection) {
                    targetSection.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    });
</script>
{{ end }}
