<!-- Floating Action Bar: Like, Share, Back to Top -->
<div id="floating-action-bar" class="fab-bar">
    <!-- Like button -->
    <button id="fab-like" class="fab-btn fab-like" aria-label="Like this page">
        <svg class="fab-heart-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <svg class="fab-heart-filled" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span id="fab-like-count" class="fab-count"></span>
    </button>

    <!-- Share button -->
    <div class="fab-share-wrapper">
        <button id="fab-share" class="fab-btn" aria-label="Share this page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
        </button>

        <!-- Share popup -->
        <div id="fab-share-popup" class="fab-share-popup">
            <button class="fab-share-option" data-share="twitter" aria-label="Share on X">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </button>
            <button class="fab-share-option" data-share="linkedin" aria-label="Share on LinkedIn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
            </button>
            <button class="fab-share-option" data-share="whatsapp" aria-label="Share on WhatsApp">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
            </button>
            <button class="fab-share-option fab-copy-link" data-share="copy" aria-label="Copy link">
                <svg class="fab-copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
                <svg class="fab-check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Back to top -->
    <button id="back-to-top" class="fab-btn fab-top" aria-label="Back to top">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
        </svg>
    </button>
</div>

<style>
    /* ============================================
       FLOATING ACTION BAR
    ============================================ */
    .fab-bar {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.625rem;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transform: translateY(20px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fab-bar.visible {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    /* ============================================
       BUTTONS
    ============================================ */
    .fab-btn {
        position: relative;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        padding: 0;
        flex-shrink: 0;
    }

    .fab-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.4);
    }

    .fab-top:hover {
        background: #3b82f6;
        border-color: #3b82f6;
        box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.4);
    }

    /* Light mode */
    [data-theme="light"] .fab-btn {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(0, 0, 0, 0.08);
        color: #1e293b;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] .fab-btn:hover {
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    [data-theme="light"] .fab-top:hover {
        background: #3b82f6;
        color: white;
    }

    /* ============================================
       LIKE BUTTON
    ============================================ */
    .fab-like {
        flex-direction: column;
        gap: 1px;
    }

    .fab-heart-filled {
        display: none;
    }

    .fab-like.liked .fab-heart-outline {
        display: none;
    }

    .fab-like.liked .fab-heart-filled {
        display: block;
        color: #ef4444;
    }

    .fab-like.liked {
        border-color: rgba(239, 68, 68, 0.3);
    }

    [data-theme="light"] .fab-like.liked {
        border-color: rgba(239, 68, 68, 0.2);
    }

    .fab-like:not(.liked):hover {
        border-color: rgba(239, 68, 68, 0.4);
    }

    .fab-like:not(.liked):hover .fab-heart-outline {
        color: #ef4444;
    }

    .fab-count {
        font-size: 0.6rem;
        font-weight: 700;
        line-height: 1;
        opacity: 0.9;
        letter-spacing: 0.02em;
    }

    .fab-like.liked .fab-count {
        color: #ef4444;
    }

    /* Pulse animation on like */
    @keyframes fab-pulse {
        0% { transform: scale(1); }
        15% { transform: scale(1.35); }
        30% { transform: scale(0.9); }
        45% { transform: scale(1.15); }
        60% { transform: scale(0.95); }
        100% { transform: scale(1); }
    }

    @keyframes fab-heart-burst {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .fab-like.fab-just-liked {
        animation: fab-pulse 0.5s ease-out, fab-heart-burst 0.6s ease-out;
    }

    /* ============================================
       SHARE WRAPPER & POPUP
    ============================================ */
    .fab-share-wrapper {
        position: relative;
    }

    .fab-share-popup {
        position: absolute;
        right: calc(100% + 0.75rem);
        top: 50%;
        transform: translateY(-50%) scale(0.8);
        display: flex;
        gap: 0.5rem;
        padding: 0.5rem;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        white-space: nowrap;
    }

    .fab-share-popup.open {
        opacity: 1;
        visibility: visible;
        transform: translateY(-50%) scale(1);
        pointer-events: auto;
    }

    [data-theme="light"] .fab-share-popup {
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(0, 0, 0, 0.08);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
    }

    .fab-share-option {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        padding: 0;
    }

    .fab-share-option:hover {
        transform: scale(1.1);
    }

    /* Share option hover colors */
    .fab-share-option[data-share="twitter"]:hover {
        background: #000;
        color: #fff;
    }

    .fab-share-option[data-share="linkedin"]:hover {
        background: #0a66c2;
        color: #fff;
    }

    .fab-share-option[data-share="whatsapp"]:hover {
        background: #25d366;
        color: #fff;
    }

    .fab-share-option[data-share="copy"]:hover {
        background: #6366f1;
        color: #fff;
    }

    [data-theme="light"] .fab-share-option {
        background: rgba(0, 0, 0, 0.05);
        color: #475569;
    }

    /* Copy link icon states */
    .fab-copy-link .fab-check-icon {
        display: none;
    }

    .fab-copy-link.copied .fab-copy-icon {
        display: none;
    }

    .fab-copy-link.copied .fab-check-icon {
        display: block;
        color: #22c55e;
    }

    .fab-copy-link.copied {
        background: rgba(34, 197, 94, 0.15) !important;
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 768px) {
        .fab-bar {
            bottom: 1.5rem;
            right: 1.5rem;
        }

        .fab-btn {
            width: 44px;
            height: 44px;
        }

        .fab-share-popup {
            right: calc(100% + 0.5rem);
        }

        .fab-share-option {
            width: 34px;
            height: 34px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .fab-bar,
        .fab-btn,
        .fab-share-popup,
        .fab-share-option {
            transition: none;
        }

        .fab-like.fab-just-liked {
            animation: none;
        }
    }
</style>

<script>
    (function () {
        /* ---- Scroll show/hide + back-to-top ---- */
        var bar = document.getElementById('floating-action-bar');
        var topBtn = document.getElementById('back-to-top');
        if (!bar) return;

        window.addEventListener('scroll', function () {
            bar.classList.toggle('visible', window.pageYOffset > 400);
        });

        if (topBtn) {
            topBtn.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        /* ---- Like ---- */
        var SUPABASE_URL = {{ site.Params.supabase.url | default "" | jsonify }};
        var SUPABASE_KEY = {{ site.Params.supabase.anonKey | default "" | jsonify }};
        var PAGE_PATH = {{ .RelPermalink | jsonify }};
        var STORAGE_KEY = 'fab-liked-' + PAGE_PATH;

        var likeBtn = document.getElementById('fab-like');
        var countEl = document.getElementById('fab-like-count');

        if (likeBtn && SUPABASE_URL) {
            // Restore liked state
            if (localStorage.getItem(STORAGE_KEY)) {
                likeBtn.classList.add('liked');
            }

            // Fetch current count
            fetch(SUPABASE_URL + '/rest/v1/page_likes?page_path=eq.' + encodeURIComponent(PAGE_PATH) + '&select=like_count', {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.length > 0 && data[0].like_count > 0) {
                    countEl.textContent = data[0].like_count;
                }
            })
            .catch(function () {});

            // Handle click
            likeBtn.addEventListener('click', function () {
                if (localStorage.getItem(STORAGE_KEY)) return;

                // Optimistic: fill heart immediately
                likeBtn.classList.add('liked', 'fab-just-liked');
                localStorage.setItem(STORAGE_KEY, '1');
                var currentCount = parseInt(countEl.textContent) || 0;
                countEl.textContent = currentCount + 1;
                setTimeout(function () { likeBtn.classList.remove('fab-just-liked'); }, 600);

                // Sync with server
                fetch(SUPABASE_URL + '/rest/v1/rpc/increment_like', {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ p_path: PAGE_PATH })
                })
                .then(function (r) { return r.json(); })
                .then(function (newCount) {
                    countEl.textContent = newCount;
                })
                .catch(function () {});
            });
        }

        /* ---- Share ---- */
        var shareBtn = document.getElementById('fab-share');
        var popup = document.getElementById('fab-share-popup');
        if (!shareBtn || !popup) return;

        var pageUrl = window.location.href;
        var pageTitle = document.title;

        shareBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            popup.classList.toggle('open');
        });

        document.addEventListener('click', function () { popup.classList.remove('open'); });
        popup.addEventListener('click', function (e) { e.stopPropagation(); });

        popup.querySelectorAll('.fab-share-option').forEach(function (opt) {
            opt.addEventListener('click', function () {
                var type = opt.dataset.share;
                var url = '';

                if (type === 'twitter') {
                    url = 'https://twitter.com/intent/tweet?url=' + encodeURIComponent(pageUrl) + '&text=' + encodeURIComponent(pageTitle);
                } else if (type === 'linkedin') {
                    url = 'https://www.linkedin.com/shareArticle?mini=true&url=' + encodeURIComponent(pageUrl) + '&title=' + encodeURIComponent(pageTitle);
                } else if (type === 'whatsapp') {
                    url = 'https://api.whatsapp.com/send?text=' + encodeURIComponent(pageTitle + ' ' + pageUrl);
                } else if (type === 'copy') {
                    navigator.clipboard.writeText(pageUrl).then(function () {
                        opt.classList.add('copied');
                        setTimeout(function () { opt.classList.remove('copied'); }, 1500);
                    });
                    return;
                }

                if (url) window.open(url, '_blank', 'noopener,width=600,height=400');
                popup.classList.remove('open');
            });
        });
    })();
</script>
